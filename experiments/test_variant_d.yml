name: nafnet_sidd_variant_d
model:
  type: variant_d
  img_channel: 3
  width: 32
  enc_blk_nums: [1, 1, 1, 28]
  middle_blk_num: 1
  dec_blk_nums: [1, 1, 1, 1]
path:
  pretrain_model: results/nafnet_sidd_variant_d/checkpoints/latest.pth
datasets:
  test:
    type: PairedImage
    lq_lmdb: data/SIDD/val/input_crops.lmdb
    gt_lmdb: data/SIDD/val/gt_crops.lmdb
    patch_size: 0
    batch_size: 1
    num_workers: 0
    shuffle: false
    pin_memory: false
    # Held-out 20% of the SIDD val LMDB; disjoint from the train-time val
    # set used for monitoring/checkpoint selection. split_ratio + split_seed
    # MUST match the train YAMLs exactly.
    split: test
    split_ratio: 0.8
    split_seed: 42
